[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = .

# `pytest-env` sets these before any plugin (including pytest-django) imports
# the Django settings module. Production still requires DJANGO_SECRET_KEY in
# the real environment; this is a test-only stand-in.
env =
    D:DJANGO_SECRET_KEY=django-insecure-test-only-do-not-deploy

addopts =
    -ra
    --strict-markers
    --strict-config
